# All-in-one Jaeger for local development.
#
#   docker compose up -d
#
# Then point jigar at the OTLP endpoint:
#
#   jigar.WithEndpoint("localhost:4317")  // OTLP/gRPC (default)
#   jigar.WithEndpoint("localhost:4318")  // OTLP/HTTP, with jigar.WithProtocol(jigar.ProtocolHTTP)
#
# Open the Jaeger UI at http://localhost:16686 and pick your service from
# the "Service" dropdown to see traces.

services:
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: jigar-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP/gRPC
      - "4318:4318" # OTLP/HTTP
      - "14268:14268" # Jaeger collector (HTTP, legacy)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 3s
      retries: 5
